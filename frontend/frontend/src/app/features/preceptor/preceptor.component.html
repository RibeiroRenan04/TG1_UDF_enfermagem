<div class="page-header"><h1>Meus Alunos — Pendências</h1></div>

<div *ngIf="loading()" class="loading-overlay"><mat-spinner diameter="48"></mat-spinner></div>

<mat-card *ngIf="!loading()">
  <mat-card-content>
    <table mat-table [dataSource]="pending()" class="full-width" *ngIf="pending().length; else empty">
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Data</th>
        <td mat-cell *matCellDef="let r">{{ r.recordedAt | date:'dd/MM/yy HH:mm' }}</td>
      </ng-container>
      <ng-container matColumnDef="student">
        <th mat-header-cell *matHeaderCellDef>Aluno</th>
        <td mat-cell *matCellDef="let r">{{ r.studentId }}</td>
      </ng-container>
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let r">{{ r.type }}</td>
      </ng-container>
      <ng-container matColumnDef="distance">
        <th mat-header-cell *matHeaderCellDef>Distância</th>
        <td mat-cell *matCellDef="let r">{{ r.distanceMeters | number:'1.0-0' }}m</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let r">
          <button mat-icon-button color="primary" (click)="validate(r.id, true)" title="Aprovar"><mat-icon>check</mat-icon></button>
          <button mat-icon-button color="warn" (click)="validate(r.id, false)" title="Reprovar"><mat-icon>close</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <ng-template #empty>
      <div class="empty-state"><mat-icon>check_circle_outline</mat-icon><p>Nenhuma pendência!</p></div>
    </ng-template>
  </mat-card-content>
</mat-card>
