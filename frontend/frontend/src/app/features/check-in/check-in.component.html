<div class="page-header">
  <h1>Registrar Presença</h1>
</div>

<!-- Escala ativa -->
<mat-card class="schedule-card" *ngIf="activeSchedule() as sched">
  <mat-card-header>
    <mat-icon mat-card-avatar>business</mat-icon>
    <mat-card-title>{{ sched.location.name }}</mat-card-title>
    <mat-card-subtitle>Turno {{ sched.shift }} — {{ sched.periodLabel }}</mat-card-subtitle>
  </mat-card-header>
</mat-card>

<mat-card class="no-schedule" *ngIf="!activeSchedule()">
  <mat-icon>event_busy</mat-icon>
  <p>Sem escala ativa para hoje.</p>
</mat-card>

<!-- Check-in aberto -->
<mat-card class="open-checkin" *ngIf="openCheckIn() as oc">
  <mat-card-header>
    <mat-icon mat-card-avatar color="accent">timer</mat-icon>
    <mat-card-title>Check-in aberto</mat-card-title>
    <mat-card-subtitle>desde {{ oc.recorded_at | date:'HH:mm' }}</mat-card-subtitle>
  </mat-card-header>
</mat-card>

<!-- Formulário de registro -->
<mat-card class="register-card" *ngIf="activeSchedule()">
  <mat-card-header>
    <mat-card-title>{{ openCheckIn() ? 'Fazer check-out' : 'Fazer check-in' }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>

    <!-- GPS -->
    <div class="gps-section">
      <button mat-stroked-button (click)="getLocation()" [disabled]="gettingLocation()">
        <mat-spinner *ngIf="gettingLocation()" diameter="18"></mat-spinner>
        <mat-icon *ngIf="!gettingLocation()">my_location</mat-icon>
        <span *ngIf="!gettingLocation() && !lat()">Capturar localização</span>
        <span *ngIf="lat()">{{ lat()! | number:'1.5-5' }}, {{ lon()! | number:'1.5-5' }}</span>
      </button>
    </div>

    <!-- Foto -->
    <div class="photo-section">
      <label class="photo-label" [class.has-photo]="photoBase64()">
        <mat-icon>camera_alt</mat-icon>
        <span>{{ photoBase64() ? 'Foto capturada' : 'Adicionar foto (opcional)' }}</span>
        <input type="file" accept="image/*" capture="environment" (change)="onPhotoCapture($event)" hidden>
      </label>
      <img *ngIf="photoBase64()" [src]="photoBase64()" class="photo-preview" alt="preview">
    </div>

    <!-- Atividades (check-out apenas) -->
    <mat-form-field appearance="outline" *ngIf="openCheckIn()" class="full-width">
      <mat-label>Descrição das atividades</mat-label>
      <textarea matInput rows="3" [formControl]="descForm.controls['activitiesDescription']"></textarea>
    </mat-form-field>

  </mat-card-content>
  <mat-card-actions>
    <button mat-raised-button color="primary" [disabled]="!lat() || busy()"
            (click)="register(openCheckIn() ? 'check_out' : 'check_in')">
      <mat-spinner *ngIf="busy()" diameter="20"></mat-spinner>
      <span *ngIf="!busy()">{{ openCheckIn() ? 'Confirmar check-out' : 'Confirmar check-in' }}</span>
    </button>
  </mat-card-actions>
</mat-card>
