name: "🔄 Sync: Frontend → Consolidado"

# ─────────────────────────────────────────────────────────────────────────────
# Dispara quando há push na branch principal do repositório FRONTEND.
# Copia os arquivos para a pasta /frontend do repositório consolidado.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch: # permite executar manualmente pela interface do GitHub

# Garante que apenas uma sincronização do frontend rode por vez.
# Se um novo push chegar enquanto uma sync estiver rodando, ela NÃO é cancelada
# (cancel-in-progress: false) para evitar estados inconsistentes.
concurrency:
  group: sync-frontend-to-consolidated
  cancel-in-progress: false

jobs:
  sync:
    name: "Sincronizar Frontend → Consolidado"
    runs-on: ubuntu-latest

    # ── Proteção anti-loop ─────────────────────────────────────────────────
    # Ignora commits que já foram gerados por este próprio bot de sincronização,
    # identificados pela tag [sync-bot] na mensagem de commit.
    if: "!contains(github.event.head_commit.message, '[sync-bot]')"

    steps:
      # ── 1. Checkout do repositório FONTE (este repo — frontend) ───────────
      - name: "📥 Checkout — Repositório Frontend"
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 1

      # ── 2. Checkout do repositório CONSOLIDADO ───────────────────────────
      # O PAT_TOKEN deve ter permissão de escrita no repositório consolidado.
      - name: "📥 Checkout — Repositório Consolidado"
        uses: actions/checkout@v4
        with:
          # ⚠️ ALTERE para o nome completo do seu repositório consolidado:
          repository: RibeiroRenan04/TG1_UDF_enfermagem
          token: ${{ secrets.PAT_TOKEN }}
          path: consolidated
          fetch-depth: 1

      # ── 3. Sincronização via rsync ─────────────────────────────────────
      # --delete: remove do destino arquivos que foram deletados na fonte.
      # Os --exclude garantem que artefatos de build e segredos não sejam copiados.
      - name: "🔄 Sincronizar arquivos via rsync"
        run: |
          mkdir -p consolidated/frontend

          rsync -av --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='.angular/' \
            --exclude='.cache/' \
            --exclude='coverage/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='!.env.example' \
            --exclude='*.log' \
            --exclude='*.tmp' \
            --exclude='*.temp' \
            --exclude='*.tsbuildinfo' \
            --exclude='.sass-cache/' \
            --exclude='.eslintcache' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='Desktop.ini' \
            source/ consolidated/frontend/

      # ── 4. Commit e Push no consolidado ──────────────────────────────────
      - name: "📝 Commit e Push no Consolidado"
        working-directory: consolidated
        env:
          GH_SHA: ${{ github.sha }}
          GH_MSG: ${{ github.event.head_commit.message }}
          GH_REPO: ${{ github.repository }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          # Verifica se há mudanças antes de commitar
          if git diff --cached --quiet; then
            echo "✅ Nenhuma alteração detectada. Sincronização desnecessária."
            exit 0
          fi

          git commit \
            -m "chore(sync/frontend): ${GH_MSG} [sync-bot]" \
            -m "Origem: ${GH_REPO}@${GH_SHA}" \
            -m "Executado por: ${GH_ACTOR}"

          git push
          echo "✅ Frontend sincronizado com sucesso!"
